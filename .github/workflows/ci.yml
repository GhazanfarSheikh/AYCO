name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck:web
      - run: pnpm check:web
      - run: pnpm build:web
      - run: pnpm test:web

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ayco
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ayco
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ayco
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test-access
      JWT_REFRESH_SECRET: test-refresh
      WEB_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @ayco/db db:migrate
      - run: pnpm typecheck:api
      - run: pnpm check:api
      - run: pnpm --filter @ayco/api build
      - run: pnpm test:api
